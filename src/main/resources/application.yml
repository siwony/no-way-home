spring:
  application:
    name: no-way-home
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/no_way_home}
    username: ${SPRING_DATASOURCE_USERNAME:no_way_home}
    password: ${SPRING_DATASOURCE_PASSWORD:no_way_home}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

housecheck:
  security:
    encryption:
      secret: ${HOUSECHECK_ENCRYPTION_SECRET:housecheck-phase1-local-only-secret}
