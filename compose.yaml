services:
  postgres:
    image: postgres:18
    container_name: no-way-home-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-no_way_home}
      POSTGRES_USER: ${POSTGRES_USER:-no_way_home}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-no_way_home}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: no-way-home-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-no_way_home}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-no_way_home}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-no_way_home}
      HOUSECHECK_DOCUMENT_INTAKE_EXTRACTION_PROVIDER: ${HOUSECHECK_DOCUMENT_INTAKE_EXTRACTION_PROVIDER:-openai}
      HOUSECHECK_DOCUMENT_INTAKE_AI_AUTH_MODE: ${HOUSECHECK_DOCUMENT_INTAKE_AI_AUTH_MODE:-api-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HOUSECHECK_DOCUMENT_INTAKE_AI_ACCESS_TOKEN: ${HOUSECHECK_DOCUMENT_INTAKE_AI_ACCESS_TOKEN:-}
      HOUSECHECK_DOCUMENT_INTAKE_AI_OAUTH_TOKEN_URL: ${HOUSECHECK_DOCUMENT_INTAKE_AI_OAUTH_TOKEN_URL:-}
      HOUSECHECK_DOCUMENT_INTAKE_AI_OAUTH_CLIENT_ID: ${HOUSECHECK_DOCUMENT_INTAKE_AI_OAUTH_CLIENT_ID:-}
      HOUSECHECK_DOCUMENT_INTAKE_AI_OAUTH_CLIENT_SECRET: ${HOUSECHECK_DOCUMENT_INTAKE_AI_OAUTH_CLIENT_SECRET:-}
      HOUSECHECK_DOCUMENT_INTAKE_AI_OAUTH_SCOPE: ${HOUSECHECK_DOCUMENT_INTAKE_AI_OAUTH_SCOPE:-}
      HOUSECHECK_DOCUMENT_INTAKE_AI_OAUTH_CLIENT_AUTHENTICATION: ${HOUSECHECK_DOCUMENT_INTAKE_AI_OAUTH_CLIENT_AUTHENTICATION:-body}
      HOUSECHECK_DOCUMENT_INTAKE_AI_MODEL: ${HOUSECHECK_DOCUMENT_INTAKE_AI_MODEL:-gpt-4.1-mini}
      HOUSECHECK_DOCUMENT_INTAKE_AI_BASE_URL: ${HOUSECHECK_DOCUMENT_INTAKE_AI_BASE_URL:-https://api.openai.com/v1}
      HOUSECHECK_DOCUMENT_INTAKE_AI_TIMEOUT: ${HOUSECHECK_DOCUMENT_INTAKE_AI_TIMEOUT:-90s}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
